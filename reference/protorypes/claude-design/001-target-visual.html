      * {
        margin: 0;

        background: #f3efe7;

        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      }
      #__bundler_loading {
        position: fixed;
        bottom: 20px;
        right: 20px;
        font:
          13px/1.4 -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        color: #666;
        background: #fff;
        padding: 8px 14px;
        border-radius: 8px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.12);
        z-index: 10000;
      }
      #__bundler_thumbnail {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f3efe7;
        z-index: 9999;
      }
      #__bundler_thumbnail svg {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      #__bundler_placeholder {
        color: #999;
        font-size: 14px;
      }

    <script>
      document.addEventListener("DOMContentLoaded", async function () {
        const loading = document.getElementById("__bundler_loading");
        function setStatus(msg) {
          if (loading) loading.textContent = msg;
        }

        // Error sink persists across replaceWith since it's on window, not the DOM.
        window.addEventListener(
          "error",
          function (e) {
            var p = document.body || document.documentElement;
            var d =
              document.getElementById("__bundler_err") ||
              p.appendChild(document.createElement("div"));
            d.id = "__bundler_err";
            d.style.cssText =
              "position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto";
            d.textContent =
              (d.textContent ? d.textContent + String.fromCharCode(10) : "") +
              "[bundle] " +
              (e.message || e.type) +
              (e.filename
                ? " (" + e.filename.slice(0, 60) + ":" + e.lineno + ")"
                : "");
          },
          true,
        );

        try {
          const manifestEl = document.querySelector(
            'script[type="__bundler/manifest"]',
          );
          const templateEl = document.querySelector(
            'script[type="__bundler/template"]',
          );
          if (!manifestEl || !templateEl) {
            setStatus("Error: missing bundle data");
            console.error(
              "[bundler] Missing script tags — manifestEl:",
              !!manifestEl,
              "templateEl:",
              !!templateEl,
            );
            return;
          }

          const manifest = JSON.parse(manifestEl.textContent);
          let template = JSON.parse(templateEl.textContent);

          const uuids = Object.keys(manifest);
          setStatus("Unpacking " + uuids.length + " assets...");

          const blobUrls = {};
          await Promise.all(
            uuids.map(async (uuid) => {
              const entry = manifest[uuid];
              try {
                const binaryStr = atob(entry.data);
                const bytes = new Uint8Array(binaryStr.length);
                for (let i = 0; i < binaryStr.length; i++)
                  bytes[i] = binaryStr.charCodeAt(i);

                let finalBytes = bytes;
                if (entry.compressed) {
                  if (typeof DecompressionStream !== "undefined") {
                    const ds = new DecompressionStream("gzip");
                    const writer = ds.writable.getWriter();
                    const reader = ds.readable.getReader();
                    writer.write(bytes);
                    writer.close();
                    const chunks = [];
                    let totalLen = 0;
                    while (true) {
                      const { done, value } = await reader.read();
                      if (done) break;
                      chunks.push(value);
                      totalLen += value.length;
                    }
                    finalBytes = new Uint8Array(totalLen);
                    let offset = 0;
                    for (const chunk of chunks) {
                      finalBytes.set(chunk, offset);
                      offset += chunk.length;
                    }
                  } else {
                    console.warn(
                      "DecompressionStream not available, asset " +
                        uuid +
                        " may not render",
                    );
                  }
                }

                blobUrls[uuid] = URL.createObjectURL(
                  new Blob([finalBytes], { type: entry.mime }),
                );
              } catch (err) {
                console.error("Failed to decode asset " + uuid + ":", err);
                blobUrls[uuid] = URL.createObjectURL(
                  new Blob([], { type: entry.mime }),
                );
              }
            }),
          );

          const extResEl = document.querySelector(
            'script[type="__bundler/ext_resources"]',
          );
          const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
          const resourceMap = {};
          for (const entry of extResources) {
            if (blobUrls[entry.uuid])
              resourceMap[entry.id] = blobUrls[entry.uuid];
          }

          setStatus("Rendering...");
          for (const uuid of uuids)
            template = template.split(uuid).join(blobUrls[uuid]);

          // Strip integrity + crossorigin — blob URLs from a file:// document inherit
          // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
          // The manifest bytes are ours; SRI protects against CDN compromise, not this.
          template = template
            .replace(/\s+integrity="[^"]*"/gi, "")
            .replace(/\s+crossorigin="[^"]*"/gi, "");

          const resourceScript =
            "<script>window.__resources = " +
            JSON.stringify(resourceMap)
              .split("</" + "script>")
              .join("<\\/" + "script>") +
            ";</" +
            "script>";
          // Inject after <head> so the DOCTYPE stays first; prepending the script
          // would push the parser into quirks mode. DOMParser always emits a <head>
          // (synthesizing one if the source HTML omitted it) but may carry
          // attributes through, so match the full opening tag. slice() rather than
          // replace() keeps us clear of $-pattern substitution in resourceScript.
          const headOpen = template.match(/<head[^>]*>/i);
          if (headOpen) {
            const i = headOpen.index + headOpen[0].length;
            template =
              template.slice(0, i) + resourceScript + template.slice(i);
          }

          // Parse the template and swap the root element. Scripts inserted via
          // DOMParser/replaceWith are inert per spec — re-create each with
          // createElement so they execute, awaiting onload for src scripts to
          // preserve ordering (React before ReactDOM before Babel before text/babel).
          const doc = new DOMParser().parseFromString(template, "text/html");
          document.documentElement.replaceWith(doc.documentElement);
          const dead = Array.from(document.scripts);
          for (const old of dead) {
            const s = document.createElement("script");
            for (const a of old.attributes) s.setAttribute(a.name, a.value);
            s.textContent = old.textContent;
            // text/babel scripts with a src: fetch and inline. transformScriptTags
            // does XHR against the src, but blob:null/ from a file:// origin is
            // silently dropped. Inlining makes it a plain inline babel script,
            // which transformScriptTags handles unconditionally.
            if ((s.type === "text/babel" || s.type === "text/jsx") && s.src) {
              const r = await fetch(s.src);
              s.textContent = await r.text();
              s.removeAttribute("src");
            }
            const p = s.src
              ? new Promise(function (r) {
                  s.onload = s.onerror = r;
                })
              : null;
            old.replaceWith(s);
            if (p) await p;
          }
          // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
          // which fired before we swapped the document. Trigger manually if present.
          if (
            window.Babel &&
            typeof window.Babel.transformScriptTags === "function"
          ) {
            window.Babel.transformScriptTags();
          }
        } catch (err) {
          setStatus("Error unpacking: " + err.message);
          console.error("Bundle unpack error:", err);
        }
      });
    </script>

al=\"\" data-d=\"240\" data-pcard=\"\" style=\"opacity: 0; transform: translateY(26px); transition: opacity .85s cubic-bezier(.16,.7,.3,1), transform .35s cubic-bezier(.16,.7,.3,1), box-shadow .35s, border-color .35s; padding: 26px 24px; border-radius: 18px; background: linear-gradient(165deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02)); border: 1px solid rgba(255,255,255,0.09); box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset;\" style-hover=\"transform: translateY(-6px); border-color: rgba(127,159,191,0.4); box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset, 0 30px 60px -30px rgba(0,0,0,0.6);\">\n          <div style=\"display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px;\"><span style=\"font: 600 11px/1 'IBM Plex Mono', monospace; color: var(--accent-lite,#7f9fbf);\">03<\u002Fspan><span style=\"width: 8px; height: 8px; border-radius: 50%; background: rgba(214,168,106,0.8); box-shadow: 0 0 10px rgba(214,168,106,0.6);\"><\u002Fspan><\u002Fdiv>\n          <p style=\"margin: 0; font-size: 17px; line-height: 1.4; color: #f3efe7; font-weight: 500;\">Critical knowledge that lives in just one person's head.<\u002Fp>\n        <\u002Fdiv>\n        <div data-reveal=\"\" data-d=\"320\" data-pcard=\"\" style=\"opacity: 0; transform: translateY(26px); transition: opacity .85s cubic-bezier(.16,.7,.3,1), transform .35s cubic-bezier(.16,.7,.3,1), box-shadow .35s, border-color .35s; padding: 26px 24px; border-radius: 18px; background: linear-gradient(165deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02)); border: 1px solid rgba(255,255,255,0.09); box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset;\" style-hover=\"transform: translateY(-6px); border-color: rgba(127,159,191,0.4); box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset, 0 30px 60px -30px rgba(0,0,0,0.6);\">\n          <div style=\"display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px;\"><span style=\"font: 600 11px/1 'IBM Plex Mono', monospace; color: var(--accent-lite,#7f9fbf);\">04<\u002Fspan><span style=\"width: 8px; height: 8px; border-radius: 50%; background: rgba(214,168,106,0.8); box-shadow: 0 0 10px rgba(214,168,106,0.6);\"><\u002Fspan><\u002Fdiv>\n          <p style=\"margin: 0; font-size: 17px; line-height: 1.4; color: #f3efe7; font-weight: 500;\">Cloud bills and incidents that no one can fully explain.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p data-reveal=\"\" data-d=\"160\" style=\"opacity: 0; transform: translateY(22px); transition: opacity 1s cubic-bezier(.16,.7,.3,1), transform 1s cubic-bezier(.16,.7,.3,1); margin: 50px 0 0; max-width: 620px; font-size: clamp(19px, 2.2vw, 25px); line-height: 1.45; color: rgba(243,239,231,0.9); font-weight: 500; letter-spacing: -0.015em;\">None of this is really a tooling problem. It's a <span style=\"font-family: 'Newsreader', serif; font-style: italic; font-weight: 400; color: var(--accent-lite,#9fb9d6);\">clarity<\u002Fspan> problem — and clarity is something you can engineer for.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ APPROACH (pipeline) ============ -->\n  <section id=\"approach\" style=\"position: relative; padding: clamp(110px, 15vh, 180px) clamp(20px, 4vw, 56px);\">\n    <div style=\"max-width: 1080px; margin: 0 auto;\">\n      <div data-reveal=\"\" style=\"opacity: 0; transform: translateY(24px); transition: opacity .9s cubic-bezier(.16,.7,.3,1), transform .9s cubic-bezier(.16,.7,.3,1); display: flex; align-items: center; gap: 13px; margin-bottom: 24px;\">\n        <span style=\"font: 600 11.5px/1 'IBM Plex Mono', monospace; letter-spacing: .2em; text-transform: uppercase; color: var(--accent,#38536f);\">02 — The Process<\u002Fspan>\n        <span style=\"flex: 1; max-width: 120px; height: 1px; background: rgba(26,23,18,0.14);\"><\u002Fspan>\n      <\u002Fdiv>\n      <h2 data-reveal=\"\" data-d=\"80\" style=\"opacity: 0; transform: translateY(28px); transition: opacity 1s cubic-bezier(.16,.7,.3,1), transform 1s cubic-bezier(.16,.7,.3,1); margin: 0 0 16px; max-width: 760px; font-weight: 700; font-size: clamp(28px, 4.2vw, 52px); line-height: 1.06; letter-spacing: -0.035em; color: #161310;\">A deliberate path from uncertainty to a system you trust.<\u002Fh2>\n      <p data-reveal=\"\" data-d=\"160\" style=\"opacity: 0; transform: translateY(24px); transition: opacity 1s cubic-bezier(.16,.7,.3,1), transform 1s cubic-bezier(.16,.7,.3,1); margin: 0 0 68px; max-width: 520px; font-size: 17px; line-height: 1.6; color: rgba(26,23,18,0.6);\">Six steps, every engagement. Predictable on purpose — because predictability is what makes complex work feel calm.<\u002Fp>\n\n      <div data-timeline=\"\" style=\"position: relative;\">\n        <div style=\"position: absolute; left: 23px; top: 24px; bottom: 24px; width: 2px; background: rgba(26,23,18,0.1); border-radius: 2px;\"><\u002Fdiv>\n        <div data-timeline-fill=\"\" style=\"position: absolute; left: 23px; top: 24px; width: 2px; height: 0px; background: linear-gradient(180deg, var(--accent,#38536f), var(--accent-lite,#6f93b8)); border-radius: 2px; box-shadow: 0 0 14px var(--accent-glow,rgba(56,83,111,0.5));\"><\u002Fdiv>\n\n        <div data-stage=\"\" data-reveal=\"\" style=\"opacity: 0; transform: translateY(26px); transition: opacity .85s cubic-bezier(.16,.7,.3,1), transform .85s cubic-bezier(.16,.7,.3,1); position: relative; display: grid; grid-template-columns: 48px 1fr; gap: 26px; padding-bottom: 18px;\">\n          <div style=\"display: flex; justify-content: center;\"><span data-stage-dot=\"\" style=\"position: relative; z-index: 2; margin-top: 20px; width: 14px; height: 14px; border-radius: 50%; background: #f3efe7; border: 2px solid rgba(26,23,18,0.18); transition: all .5s;\"><\u002Fspan><\u002Fdiv>\n          <div data-scard=\"\" style=\"padding: 26px 28px; border-radius: 18px; background: linear-gradient(165deg, #ffffff, #f8f4ed); border: 1px solid rgba(26,23,18,0.08); box-shadow: 0 1px 2px rgba(26,23,18,0.03); transition: transform .35s cubic-bezier(.16,.7,.3,1), box-shadow .35s, border-color .35s;\" style-hover=\"transform: translateY(-4px); box-shadow: 0 28px 56px -28px rgba(26,23,18,0.22); border-color: var(--accent-tint2,rgba(56,83,111,0.22));\"><div style=\"display: flex; align-items: center; gap: 12px; margin-bottom: 12px;\"><span style=\"font: 600 11px/1 'IBM Plex Mono', monospace; letter-spacing: .12em; color: var(--accent,#38536f); padding: 5px 9px; border-radius: 7px; background: var(--accent-tint,rgba(56,83,111,0.1));\">01 · LISTEN<\u002Fspan><\u002Fdiv><h3 style=\"margin: 0 0 8px; font-weight: 700; font-size: clamp(21px, 2.4vw, 27px); line-height: 1.15; letter-spacing: -0.02em; color: #161310;\">Understand before designing.<\u002Fh3><p style=\"margin: 0; max-width: 560px; font-size: 16px; line-height: 1.6; color: rgba(26,23,18,0.6);\">The business, the constraints, the team and what \"good\" actually means here. Most of the answer lives in the questions everyone stopped asking.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div data-stage=\"\" data-reveal=\"\" data-d=\"40\" style=\"opacity: 0; transform: translateY(26px); transition: opacity .85s cubic-bezier(.16,.7,.3,1), transform .85s cubic-bezier(.16,.7,.3,1); position: relative; display: grid; grid-template-columns: 48px 1fr; gap: 26px; padding-bottom: 18px;\">\n          <div style=\"display: flex; justify-content: center;\"><span data-stage-dot=\"\" style=\"position: relative; z-index: 2; margin-top: 20px; width: 14px; height: 14px; border-radius: 50%; background: #f3efe7; border: 2px solid rgba(26,23,18,0.18); transition: all .5s;\"><\u002Fspan><\u002Fdiv>\n          <div data-scard=\"\" style=\"padding: 26px 28px; border-radius: 18px; background: linear-gradient(165deg, #ffffff, #f8f4ed); border: 1px solid rgba(26,23,18,0.08); box-shadow: 0 1px 2px rgba(26,23,18,0.03); transition: transform .35s cubic-bezier(.16,.7,.3,1), box-shadow .35s, border-color .35s;\" style-hover=\"transform: translateY(-4px); box-shadow: 0 28px 56px -28px rgba(26,23,18,0.22); border-color: var(--accent-tint2,rgba(56,83,111,0.22));\"><div style=\"display: flex; align-items: center; gap: 12px; margin-bottom: 12px;\"><span style=\"font: 600 11px/1 'IBM Plex Mono', monospace; letter-spacing: .12em; color: var(--accent,#38536f); padding: 5px 9px; border-radius: 7px; background: var(--accent-tint,rgba(56,83,111,0.1));\">02 · MAP<\u002Fspan><\u002Fdiv><h3 style=\"margin: 0 0 8px; font-weight: 700; font-size: clamp(21px, 2.4vw, 27px); line-height: 1.15; letter-spacing: -0.02em; color: #161310;\">Make the system visible.<\u002Fh3><p style=\"margin: 0; max-width: 560px; font-size: 16px; line-height: 1.6; color: rgba(26,23,18,0.6);\">Surface the real architecture, the dependencies and the risks — plainly, on paper — before they surface themselves at the worst possible moment.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div data-stage=\"\" data-reveal=\"\" data-d=\"40\" style=\"opacity: 0; transform: translateY(26px); transition: opacity .85s cubic-bezier(.16,.7,.3,1), transform .85s cubic-bezier(.16,.7,.3,1); position: relative; display: grid; grid-template-columns: 48px 1fr; gap: 26px; padding-bottom: 18px;\">\n          <div style=\"display: flex; justify-content: center;\"><span data-stage-dot=\"\" style=\"position: relative; z-index: 2; margin-top: 20px; width: 14px; height: 14px; border-radius: 50%; background: #f3efe7; border: 2px solid rgba(26,23,18,0.18); transition: all .5s;\"><\u002Fspan><\u002Fdiv>\n          <div data-scard=\"\" style=\"padding: 26px 28px; border-radius: 18px; background: linear-gradient(165deg, #ffffff, #f8f4ed); border: 1px solid rgba(26,23,18,0.08); box-shadow: 0 1px 2px rgba(26,23,18,0.03); transition: transform .35s cubic-bezier(.16,.7,.3,1), box-shadow .35s, border-color .35s;\" style-hover=\"transform: translateY(-4px); box-shadow: 0 28px 56px -28px rgba(26,23,18,0.22); border-color: var(--accent-tint2,rgba(56,83,111,0.22));\"><div style=\"display: flex; align-items: center; gap: 12px; margin-bottom: 12px;\"><span style=\"font: 600 11px/1 'IBM Plex Mono', monospace; letter-spacing: .12em; color: var(--accent,#38536f); padding: 5px 9px; border-radius: 7px; background: var(--accent-tint,rgba(56,83,111,0.1));\">03 · ARCHITECT<\u002Fspan><\u002Fdiv><h3 style=\"margin: 0 0 8px; font-weight: 700; font-size: clamp(21px, 2.4vw, 27px); line-height: 1.15; letter-spacing: -0.02em; color: #161310;\">Design for simplicity first.<\u002Fh3><p style=\"margin: 0; max-width: 560px; font-size: 16px; line-height: 1.6; color: rgba(26,23,18,0.6);\">Resilience and scale are outcomes of clarity, not additions to it. The best architecture is the one your team can hold in their heads.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div data-stage=\"\" data-reveal=\"\" data-d=\"40\" style=\"opacity: 0; transform: translateY(26px); transition: opacity .85s cubic-bezier(.16,.7,.3,1), transform .85s cubic-bezier(.16,.7,.3,1); position: relative; display: grid; grid-template-columns: 48px 1fr; gap: 26px; padding-bottom: 18px;\">\n          <div style=\"display: flex; justify-content: center;\"><span data-stage-dot=\"\" style=\"position: relative; z-index: 2; margin-top: 20px; width: 14px; height: 14px; border-radius: 50%; background: #f3efe7; border: 2px solid rgba(26,23,18,0.18); transition: all .5s;\"><\u002Fspan><\u002Fdiv>\n          <div data-scard=\"\" style=\"padding: 26px 28px; border-radius: 18px; background: linear-gradient(165deg, #ffffff, #f8f4ed); border: 1px solid rgba(26,23,18,0.08); box-shadow: 0 1px 2px rgba(26,23,18,0.03); transition: transform .35s cubic-bezier(.16,.7,.3,1), box-shadow .35s, border-color .35s;\" style-hover=\"transform: translateY(-4px); box-shadow: 0 28px 56px -28px rgba(26,23,18,0.22); border-color: var(--accent-tint2,rgba(56,83,111,0.22));\"><div style=\"display: flex; align-items: center; gap: 12px; margin-bottom: 12px;\"><span style=\"font: 600 11px/1 'IBM Plex Mono', monospace; letter-spacing: .12em; color: var(--accent,#38536f); padding: 5px 9px; border-radius: 7px; background: var(--accent-tint,rgba(56,83,111,0.1));\">04 · AUTOMATE<\u002Fspan><\u002Fdiv><h3 style=\"margin: 0 0 8px; font-weight: 700; font-size: clamp(21px, 2.4vw, 27px); line-height: 1.15; letter-spacing: -0.02em; color: #161310;\">Make deployments boring.<\u002Fh3><p style=\"margin: 0; max-width: 560px; font-size: 16px; line-height: 1.6; color: rgba(26,23,18,0.6);\">Everything codified, repeatable and reviewable. When shipping is calm and unremarkable, your team gets to spend its attention elsewhere.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div data-stage=\"\" data-reveal=\"\" data-d=\"40\" style=\"opacity: 0; transform: translateY(26px); transition: opacity .85s cubic-bezier(.16,.7,.3,1), transform .85s cubic-bezier(.16,.7,.3,1); position: relative; display: grid; grid-template-columns: 48px 1fr; gap: 26px; padding-bottom: 18px;\">\n          <div style=\"display: flex; justify-content: center;\"><span data-stage-dot=\"\" style=\"position: relative; z-index: 2; margin-top: 20px; width: 14px; height: 14px; border-radius: 50%; background: #f3efe7; border: 2px solid rgba(26,23,18,0.18); transition: all .5s;\"><\u002Fspan><\u002Fdiv>\n          <div data-scard=\"\" style=\"padding: 26px 28px; border-radius: 18px; background: linear-gradient(165deg, #ffffff, #f8f4ed); border: 1px solid rgba(26,23,18,0.08); box-shadow: 0 1px 2px rgba(26,23,18,0.03); transition: transform .35s cubic-bezier(.16,.7,.3,1), box-shadow .35s, border-color .35s;\" style-hover=\"transform: translateY(-4px); box-shadow: 0 28px 56px -28px rgba(26,23,18,0.22); border-color: var(--accent-tint2,rgba(56,83,111,0.22));\"><div style=\"display: flex; align-items: center; gap: 12px; margin-bottom: 12px;\"><span style=\"font: 600 11px/1 'IBM Plex Mono', monospace; letter-spacing: .12em; color: var(--accent,#38536f); padding: 5px 9px; border-radius: 7px; background: var(--accent-tint,rgba(56,83,111,0.1));\">05 · HARDEN<\u002Fspan><\u002Fdiv><h3 style=\"margin: 0 0 8px; font-weight: 700; font-size: clamp(21px, 2.4vw, 27px); line-height: 1.15; letter-spacing: -0.02em; color: #161310;\">Build in observability and recovery.<\u002Fh3><p style=\"margin: 0; max-width: 560px; font-size: 16px; line-height: 1.6; color: rgba(26,23,18,0.6);\">Security, monitoring and a tested path back from failure — designed in from the start, never bolted on after something has already gone wrong.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div data-stage=\"\" data-reveal=\"\" data-d=\"40\" style=\"opacity: 0; transform: translateY(26px); transition: opacity .85s cubic-bezier(.16,.7,.3,1), transform .85s cubic-bezier(.16,.7,.3,1); position: relative; display: grid; grid-template-columns: 48px 1fr; gap: 26px;\">\n          <div style=\"display: flex; justify-content: center;\"><span data-stage-dot=\"\" style=\"position: relative; z-index: 2; margin-top: 20px; width: 14px; height: 14px; border-radius: 50%; background: #f3efe7; border: 2px solid rgba(26,23,18,0.18); transition: all .5s;\"><\u002Fspan><\u002Fdiv>\n          <div data-scard=\"\" style=\"padding: 26px 28px; border-radius: 18px; background: linear-gradient(165deg, var(--accent,#38536f), var(--accent-2,#2b4156)); border: 1px solid rgba(26,23,18,0.08); box-shadow: 0 20px 50px -24px var(--accent-glow,rgba(56,83,111,0.6)); transition: transform .35s cubic-bezier(.16,.7,.3,1), box-shadow .35s;\" style-hover=\"transform: translateY(-4px); box-shadow: 0 34px 70px -28px var(--accent-glow,rgba(56,83,111,0.7));\"><div style=\"display: flex; align-items: center; gap: 12px; margin-bottom: 12px;\"><span style=\"font: 600 11px/1 'IBM Plex Mono', monospace; letter-spacing: .12em; color: #fff; padding: 5px 9px; border-radius: 7px; background: rgba(255,255,255,0.16);\">06 · HAND OVER<\u002Fspan><\u002Fdiv><h3 style=\"margin: 0 0 8px; font-weight: 700; font-size: clamp(21px, 2.4vw, 27px); line-height: 1.15; letter-spacing: -0.02em; color: #fff;\">Document, transfer, step back.<\u002Fh3><p style=\"margin: 0; max-width: 560px; font-size: 16px; line-height: 1.6; color: rgba(255,255,255,0.78);\">The system should outlive my involvement. Success is the moment your team no longer needs me — and feels fully in control of what we built together.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ EVIDENCE (bento) ============ -->\n  <section id=\"evidence\" style=\"position: relative; padding: clamp(96px, 12vh, 160px) clamp(20px, 4vw, 56px); background: linear-gradient(180deg, #f3efe7, #efe9df);\">\n    <div style=\"max-width: 1120px; margin: 0 auto;\">\n      <div data-reveal=\"\" style=\"opacity: 0; transform: translateY(24px); transition: opacity .9s cubic-bezier(.16,.7,.3,1), transform .9s cubic-bezier(.16,.7,.3,1); display: flex; align-items: center; gap: 13px; margin-bottom: 24px;\">\n        <span style=\"font: 600 11.5px/1 'IBM Plex Mono', monospace; letter-spacing: .2em; text-transform: uppercase; color: var(--accent,#38536f);\">03 — Evidence<\u002Fspan>\n        <span style=\"flex: 1; max-width: 120px; height: 1px; background: rgba(26,23,18,0.14);\"><\u002Fspan>\n      <\u002Fdiv>\n      <h2 data-reveal=\"\" data-d=\"80\" style=\"opacity: 0; transform: translateY(28px); transition: opacity 1s cubic-bezier(.16,.7,.3,1), transform 1s cubic-bezier(.16,.7,.3,1); margin: 0 0 52px; max-width: 760px; font-weight: 700; font-size: clamp(28px, 4.2vw, 52px); line-height: 1.06; letter-spacing: -0.035em; color: #161310;\">Stated plainly. <span style=\"color: rgba(26,23,18,0.42);\">Confidence belongs in the work, not the adjectives.<\u002Fspan><\u002Fh2>\n\n      <div data-bento=\"\" style=\"display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px;\">\n        <!-- featured -->\n        <div data-reveal=\"\" data-d=\"60\" data-card=\"\" style=\"grid-column: span 4; opacity: 0; transform: translateY(26px); transition: opacity .85s cubic-bezier(.16,.7,.3,1), transform .35s cubic-bezier(.16,.7,.3,1), box-shadow .35s, border-color .35s; position: relative; padding: 34px; border-radius: 22px; background: linear-gradient(165deg, #ffffff, #f8f4ed); border: 1px solid rgba(26,23,18,0.08); box-shadow: 0 1px 2px rgba(26,23,18,0.03); overflow: hidden;\" style-hover=\"transform: translateY(-6px); box-shadow: 0 34px 66px -30px rgba(26,23,18,0.24); border-color: var(--accent-tint2,rgba(56,83,111,0.22));\">\n          <div style=\"position: absolute; top: -30%; right: -10%; width: 320px; height: 320px; border-radius: 50%; background: radial-gradient(circle, var(--accent-tint2,rgba(56,83,111,0.16)), transparent 65%); pointer-events: none;\"><\u002Fdiv>\n          <span style=\"font: 600 11px/1 'IBM Plex Mono', monospace; letter-spacing: .14em; text-transform: uppercase; color: var(--accent,#38536f);\">Discipline<\u002Fspan>\n          <h3 style=\"margin: 16px 0 12px; max-width: 420px; font-weight: 700; font-size: clamp(23px, 2.6vw, 31px); line-height: 1.12; letter-spacing: -0.025em; color: #161310;\">Three disciplines, held to one standard.<\u002Fh3>\n          <p style=\"margin: 0 0 28px; max-width: 460px; font-size: 16px; line-height: 1.6; color: rgba(26,23,18,0.6);\">Architecture, DevOps and platform engineering aren't separate jobs — they're one continuous responsibility: building systems that are clear to design, calm to run and safe to change.<\u002Fp>\n          <div style=\"display: flex; flex-wrap: wrap; gap: 10px;\">\n            <span style=\"display: inline-flex; align-items: center; gap: 8px; padding: 9px 14px; border-radius: 10px; background: rgba(26,23,18,0.04); border: 1px solid rgba(26,23,18,0.07); font: 600 13px/1 'Hanken Grotesk', sans-serif; color: rgba(26,23,18,0.72);\"><span style=\"width: 7px; height: 7px; border-radius: 2px; background: var(--accent,#38536f);\"><\u002Fspan>IT Architecture<\u002Fspan>\n            <span style=\"display: inline-flex; align-items: center; gap: 8px; padding: 9px 14px; border-radius: 10px; background: rgba(26,23,18,0.04); border: 1px solid rgba(26,23,18,0.07); font: 600 13px/1 'Hanken Grotesk', sans-serif; color: rgba(26,23,18,0.72);\"><span style=\"width: 7px; height: 7px; border-radius: 2px; background: var(--accent-lite,#6f93b8);\"><\u002Fspan>Cloud Engineering<\u002Fspan>\n            <span style=\"display: inline-flex; align-items: center; gap: 8px; padding: 9px 14px; border-radius: 10px; background: rgba(26,23,18,0.04); border: 1px solid rgba(26,23,18,0.07); font: 600 13px/1 'Hanken Grotesk', sans-serif; color: rgba(26,23,18,0.72);\"><span style=\"width: 7px; height: 7px; border-radius: 2px; background: #5b9b78;\"><\u002Fspan>DevOps<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- AWS cert -->\n        <div data-reveal=\"\" data-d=\"140\" data-card=\"\" style=\"grid-column: span 2; opacity: 0; transform: translateY(26px); transition: opacity .85s cubic-bezier(.16,.7,.3,1), transform .35s cubic-bezier(.16,.7,.3,1), box-shadow .35s, border-color .35s; display: flex; flex-direction: column; justify-content: space-between; padding: 28px; border-radius: 22px; background: linear-gradient(165deg, var(--accent,#38536f), var(--accent-2,#2b4156)); border: 1px solid rgba(26,23,18,0.08); box-shadow: 0 20px 46px -24px var(--accent-glow,rgba(56,83,111,0.6)); overflow: hidden; position: relative;\" style-hover=\"transform: translateY(-6px); box-shadow: 0 34px 66px -28px var(--accent-glow,rgba(56,83,111,0.7));\">\n          <div style=\"position: absolute; bottom: -25%; left: -15%; width: 220px; height: 220px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.12), transparent 65%); pointer-events: none;\"><\u002Fdiv>\n          <div style=\"position: relative;\"><span style=\"display: inline-flex; width: 46px; height: 46px; border-radius: 12px; background: rgba(255,255,255,0.14); border: 1px solid rgba(255,255,255,0.2); align-items: center; justify-content: center; color: #fff; font: 700 17px/1 'Hanken Grotesk', ,0.24); border-color: var(--accent-tint2,rgba(56,83,111,0.22));\">\n          <span style=\"flex-shrink: 0; width: 52px; height: 52px; border-radius: 14px; background: var(--accent-tint,rgba(56,83,111,0.1)); border: 1px solid var(--accent-tint2,rgba(56,83,111,0.2)); display: flex; align-items: center; justify-content: center; font-size: 22px; color: var(--accent,#38536f);\">“<\u002Fspan>\n          <p style=\"margin: 0; font-size: clamp(17px, 1.8vw, 21px); line-height: 1.4; letter-spacing: -0.01em; color: #1a1712; font-weight: 500;\">Leave every system better documented than I found it. <span style=\"color: rgba(26,23,18,0.5);\">That single rule shapes every decision.<\u002Fspan><\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ COLLABORATION ============ -->\n  <section id=\"collab\" style=\"position: relative; padding: clamp(96px, 12vh, 160px) clamp(20px, 4vw, 56px);\">\n    <div style=\"max-width: 1120px; margin: 0 auto;\">\n      <div data-reveal=\"\" style=\"opacity: 0; transform: translateY(24px); transition: opacity .9s cubic-bezier(.16,.7,.3,1), transform .9s cubic-bezier(.16,.7,.3,1); display: flex; align-items: center; gap: 13px; margin-bottom: 24px;\">\n        <span style=\"font: 600 11.5px/1 'IBM Plex Mono', monospace; letter-spacing: .2em; text-transform: uppercase; color: var(--accent,#38536f);\">04 — Collaboration<\u002Fspan>\n        <span style=\"flex: 1; max-width: 120px; height: 1px; background: rgba(26,23,18,0.14);\"><\u002Fspan>\n      <\u002Fdiv>\n      <h2 data-reveal=\"\" data-d=\"80\" style=\"opacity: 0; transform: translateY(28px); transition: opacity 1s cubic-bezier(.16,.7,.3,1), transform 1s cubic-bezier(.16,.7,.3,1); margin: 0 0 16px; max-width: 680px; font-weight: 700; font-size: clamp(28px, 4.2vw, 52px); line-height: 1.06; letter-spacing: -0.035em; color: #161310;\">What it actually feels like to work together.<\u002Fh2>\n      <p data-reveal=\"\" data-d=\"160\" style=\"opacity: 0; transform: translateY(24px); transition: opacity 1s cubic-bezier(.16,.7,.3,1), transform 1s cubic-bezier(.16,.7,.3,1); margin: 0 0 52px; max-width: 540px; font-size: 17px; line-height: 1.6; color: rgba(26,23,18,0.6);\">Good engineering is also a good experience. You should feel more in control at the end of every conversation than you did at the start.<\u002Fp>\n\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; align-items: stretch;\">\n        <div data-reveal=\"\" data-d=\"80\" style=\"opacity: 0; transform: translateY(26px); transition: opacity .85s cubic-bezier(.16,.7,.3,1), transform .85s cubic-bezier(.16,.7,.3,1); background: rgba(26,23,18,0.025); border: 1px solid rgba(26,23,18,0.1); border-radius: 22px; padding: 34px;\">\n          <span style=\"font: 600 11px/1 'IBM Plex Mono', monospace; letter-spacing: .14em; text-transform: uppercase; color: rgba(26,23,18,0.42);\">How it often goes<\u002Fspan>\n          <div style=\"display: flex; flex-direction: column; gap: 16px; margin-top: 26px;\">\n            <div style=\"display: grid; grid-template-columns: 20px 1fr; gap: 13px; align-items: start;\"><span style=\"margin-top: 4px; width: 15px; height: 15px; border-radius: 50%; border: 1.5px solid rgba(26,23,18,0.22);\"><\u002Fspan><span style=\"font-size: 15.5px; line-height: 1.5; color: rgba(26,23,18,0.58);\">Decisions made privately, explained later — if at all.<\u002Fspan><\u002Fdiv>\n            <div style=\"display: grid; grid-template-columns: 20px 1fr; gap: 13px; align-items: start;\"><span style=\"margin-top: 4px; width: 15px; height: 15px; border-radius: 50%; border: 1.5px solid rgba(26,23,18,0.22);\"><\u002Fspan><span style=\"font-size: 15.5px; line-height: 1.5; color: rgba(26,23,18,0.58);\">Complexity hidden behind a tool, not actually removed.<\u002Fspan><\u002Fdiv>\n            <div style=\"display: grid; grid-template-columns: 20px 1fr; gap: 13px; align-items: start;\"><span style=\"margin-top: 4px; width: 15px; height: 15px; border-radius: 50%; border: 1.5px solid rgba(26,23,18,0.22);\"><\u002Fspan><span style=\"font-size: 15.5px; line-height: 1.5; color: rgba(26,23,18,0.58);\">Documentation written at the end, in a hurry.<\u002Fspan><\u002Fdiv>\n            <div style=\"display: grid; grid-template-columns: 20px 1fr; gap: 13px; align-items: start;\"><span style=\"margin-top: 4px; width: 15px; height: 15px; border-radius: 50%; border: 1.5px solid rgba(26,23,18,0.22);\"><\u002Fspan><span style=\"font-size: 15.5px; line-height: 1.5; color: rgba(26,23,18,0.58);\">Success measured by launch day, then forgotten.<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div data-reveal=\"\" data-d=\"160\" style=\"opacity: 0; transform: translateY(26px); transition: opacity .85s cubic-bezier(.16,.7,.3,1), transform .85s cubic-bezier(.16,.7,.3,1); position: relative; background: linear-gradient(165deg, var(--accent,#38536f), var(--accent-2,#2b4156)); border-radius: 22px; padding: 34px; box-shadow: 0 40px 80px -36px var(--accent-glow,rgba(56,83,111,0.6)); overflow: hidden;\">\n          <div style=\"position: absolute; top: -28%; right: -16%; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.14), transparent 65%); pointer-events: none;\"><\u002Fdiv>\n          <span style=\"font: 600 11px/1 'IBM Plex Mono', monospace; letter-spacing: .14em; text-transform: uppercase; color: rgba(255,255,255,0.72); position: relative;\">Working with Celia<\u002Fspan>\n          <div style=\"display: flex; flex-direction: column; gap: 16px; margin-top: 26px; position: relative;\">\n            <div style=\"display: grid; grid-template-columns: 20px 1fr; gap: 13px; align-items: start;\"><span style=\"margin-top: 1px; font-size: 15px; color: #aee6c4;\">✓<\u002Fspan><span style=\"font-size: 15.5px; line-height: 1.5; color: rgba(255,255,255,0.94);\">Decisions made with you, in plain language, as we go.<\u y-content: space-between; flex-wrap: wrap; gap: 16px; max-width: 1240px; margin: 0 auto;\">\n    <button data-target=\"hero\" data-nav=\"\" style=\"all: unset; cursor: pointer; display: flex; align-items: center; gap: 10px;\">\n      <span style=\"width: 26px; height: 26px; border-radius: 8px; background: linear-gradient(150deg, var(--accent,#38536f), var(--accent-2,#2b4156)); display: flex; align-items: center; justify-content: center;\"><span style=\"width: 9px; height: 9px; border: 2px solid rgba(255,255,255,0.9); border-radius: 3px;\"><\u002Fspan><\u002Fspan>\n      <span style=\"display: flex; flex-direction: column; line-height: 1.1;\"><span style=\"font: 700 14px/1 'Hanken Grotesk', sans-serif; color: #1a1712;\">Celia Rico<\u002Fspan><span style=\"font: 500 9px/1 'IBM Plex Mono', monospace; letter-spacing: .16em; text-transform: uppercase; color: rgba(26,23,18,0.4); margin-top: 5px;\">Cloud Architect · DevOps<\u002Fspan><\u002Fspan>\n    <\u002Fbutton>\n    <span style=\"font: 500 11px/1 'IBM Plex Mono', monospace; letter-spacing: .12em; text-transform: uppercase; color: rgba(26,23,18,0.36);\">Crafted with care · 2026<\u002Fspan>\n    <button data-target=\"hero\" data-nav=\"\" style=\"all: unset; cursor: pointer; font: 600 12.5px/1 'Hanken Grotesk', sans-serif; color: rgba(26,23,18,0.5); display: inline-flex; align-items: center; gap: 7px; transition: color .3s;\" style-hover=\"color: var(--accent,#38536f);\">Back to top ↑<\u002Fbutton>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accentColor&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#38536f&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;#38536f&quot;, &quot;#2f6b54&quot;, &quot;#9a5a3a&quot;, &quot;#5a4a7a&quot;, &quot;#3a4a6b&quot;], &quot;section&quot;: &quot;Theme&quot;}, &quot;reduceMotion&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Motion&quot;}, &quot;grain&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Texture&quot;}}\">\nclass Component extends DCLogic {\n  rootRef = (el) => { this._root = el; };\n\n  componentDidMount() {\n    this._applyProps();\n    requestAnimationFrame(() => this._init());\n  }\n  componentDidUpdate() { this._applyProps(); }\n\n  _hexToRgb(hex) {\n    let h = (hex || '#38536f').replace('#', '');\n    if (h.length === 3) h = h.split('').map(c => c + c).join('');\n    const n = parseInt(h, 16);\n    return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };\n  }\n\n  _applyProps() {\n    if (!this._root) return;\n    const accent = this.props.accentColor || '#38536f';\n    const { r, g, b } = this._hexToRgb(accent);\n    const dk = c => Math.round(c * 0.76);\n    const lt = c => Math.round(c + (255 - c) * 0.32);\n    const s = this._root.style;\n    s.setProperty('--accent', accent);\n    s.setProperty('--accent-2', `rgb(${dk(r)},${dk(g)},${dk(b)})`);\n    s.setProperty('--accent-lite', `rgb(${lt(r)},${lt(g)},${lt(b)})`);\n    s.setProperty('--accent-tint', `rgba(${r},${g},${b},0.1)`);\n    s.setProperty('--accent-tint2', `rgba(${r},${g},${b},0.2)`);\n    s.setProperty('--accent-glow', `rgba(${r},${g},${b},0.55)`);\n    const grain = this._root.querySelector('[data-grain]');\n    if (grain) grain.style.display = (this.props.grain === false) ? 'none' : '';\n  }\n\n  _init() {\n    if (!this._root || this._inited) return;\n    this._inited = true;\n    const root = this._root;\n    const reduce = this.props.reduceMotion === true;\n\n    // reveals\n    const reveals = Array.from(root.querySelectorAll('[data-reveal]'));\n    if (reduce) {\n      reveals.forEach(el => { el.style.transition = 'none'; el.style.opacity = '1'; el.style.transform = 'none'; });\n    } else {\n      const io = new IntersectionObserver((entries) => {\n        entries.forEach(e => {\n          if (e.isIntersecting) {\n            const el = e.target;\n            const delay = parseInt(el.getAttribute('data-d') || '0', 10);\n            el.style.transitionDelay = delay + 'ms';\n            el.style.opacity = '1';\n            el.style.transform = 'none';\n            io.unobserve(el);\n          }\n        });\n      }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });\n      reveals.forEach(el => io.observe(el));\n      this._fallback = setTimeout(() => reveals.forEach(el => { el.style.opacity = '1'; el.style.transform = 'none'; }), 2800);\n    }\n\n    // rail + nav\n    const ids = ['hero', 'problem', 'approach', 'evidence', 'collab', 'contact'];\n    const sections = ids.map(id => root.querySelector('#' + id));\n    const dots = Array.from(root.querySelectorAll('[data-rail-dot]'));\n    const railFill = root.querySelector('[data-rail-fill]');\n    const topbar = root.querySelector('[data-topbar]');\n\n    const scrollToId = (id) => {\n      const el = root.querySelector('#' + id);\n      if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 1, behavior: 'smooth' });\n    };\n    root.querySelectorAll('[data-target]').forEach(btn => {\n      btn.addEventListener('click', () => scrollToId(btn.getAttribute('data-target')));\n    });\n\n    const setActive = (idx) => {\n      dots.forEach((dot, i) => {\n        const mark = dot.querySelector('[data-dot]');\n        const on = i === idx;\n        if (mark) {\n          mark.style.background = on ? 'var(--accent,#38536f)' : '#f3efe7';\n          mark.style.borderColor = on ? 'var(--accent,#38536f)' : 'rgba(26,23,18,0.22)';\n          mark.style.transform = on ? 'scale(1.3)' : 'scale(1)';\n          mark.style.boxShadow = on ? '0 0 0 4px var(--accent-tint,rgba(56,83,111,0.1))' : 'none';\n        }\n      });\n    };\n    dots.forEach(dot => {\n      const label = dot.querySelector('[data-dot-label]');\n      if (!label) return;\n      dot.addEventListener('mouseenter', () => { label.style.opacity = '1'; label.style.transform = 'translateX(0)'; });\n      dot.addEventListener('mouseleave', () => { label.style.opacity = '0'; label.style.transform = 'translateX(-4px)'; });\n    });\n\n    const plx = Array.from(root.querySelectorAll('[data-parallax]'));\n    const timeline = root.querySelector('[data-timeline]');\n    const fill = root.querySelector('[data-timeline-fill]');\n    const stageDots = Array.from(root.querySelectorAll('[data-stage-dot]'));\n    const navlinks = Array.from(root.querySelectorAll('[data-navlink]'));\n\n    let ticking = false;\n    const onScroll = () => {\n      if (ticking) return;\n      ticking = true;\n      requestAnimationFrame(() => {\n        const vh = window.innerHeight;\n        const y = window.scrollY;\n        const docH = document.documentElement.scrollHeight - vh;\n\n        if (railFill) railFill.style.height = Math.max(0, Math.min(100, (y / docH) * 100)) + '%';\n\n        // topbar background after scroll\n        if (topbar) {\n          if (y > 40) {\n            topbar.style.background = 'rgba(243,239,231,0.8)';\n            topbar.style.backdropFilter = 'blur(14px)';\n            topbar.style.borderBottomColor = 'rgba(26,23,18,0.08)';\n          } else {\n            topbar.style.background = 'transparent';\n            topbar.style.backdropFilter = 'none';\n            topbar.style.borderBottomColor = 'transparent';\n          }\n        }\n        // hide light navlinks over the dark problem section\n        const probTop = sections[1] ? sections[1].getBoundingClientRect().top : 9999;\n        const probBot = sections[1] ? sections[1].getBoundingClientRect().bottom : 0;\n        const overDark = probTop < 60 && probBot > 60;\n        navlinks.forEach(n => { n.style.color = overDark ? 'rgba(243,239,231,0.7)' : 'rgba(26,23,18,0.62)'; });\n\n        let active = 0;\n        sections.forEach((sec, i) => { if (sec && sec.getBoundingClientRect().top <= vh * 0.42) active = i; });\n        if (active !== this._active) { this._active = active; setActive(active); }\n\n        if (!reduce) {\n          plx.forEach(el => {\n            const speed = parseFloat(el.getAttribute('data-speed') || '0.1');\n            const rect = el.getBoundingClientRect();\n            const center = rect.top + rect.height / 2 - vh / 2;\n            const base = el.getAttribute('data-base') || '';\n            el.style.transform = `translateY(${(-center * speed).toFixed(1)}px) ${base}`;\n          });\n        }\n\n        if (timeline && fill) {\n          const r = timeline.getBoundingClientRect();\n          const start = vh * 0.6;\n          const prog = Math.max(0, Math.min(1, (start - r.top) / r.height));\n          fill.style.height = (prog * r.height) + 'px';\n          stageDots.forEach(dot => {\n            const dr = dot.getBoundingClientRect();\n            const passed = dr.top < start;\n            dot.style.background = passed ? 'var(--accent,#38536f)' : '#f3efe7';\n            dot.style.borderColor = passed ? 'var(--accent,#38536f)' : 'rgba(26,23,18,0.18)';\n            dot.style.boxShadow = passed ? '0 0 0 5px var(--accent-tint,rgba(56,83,111,0.1))' : 'none';\n          });\n        }\n        ticking = false;\n      });\n    };\n\n    window.addEventListener('scroll', onScroll, { passive: true });\n    window.addEventListener('resize', onScroll, { passive: true });\n    this._onScroll = onScroll;\n    setActive(0);\n    onScroll();\n\n    // hero card tilt\n    if (!reduce) {\n      const tilt = root.querySelector('[data-tilt]');\n      const visual = root.querySelector('[data-hero-visual]');\n      if (tilt && visual) {\n        visual.addEventListener('mousemove', (ev) => {\n          const r = visual.getBoundingClientRect();\n          const px = (ev.clientX - r.left) / r.width - 0.5;\n          const py = (ev.clientY - r.top) / r.height - 0.5;\n          tilt.style.transform = `perspective(1400px) rotateY(${(px * 7).toFixed(2)}deg) rotateX(${(-py * 7).toFixed(2)}deg) translateY(-2px)`;\n        });\n        visual.addEventListener('mouseleave', () => { tilt.style.transform = 'perspective(1400px) rotateY(0deg) rotateX(0deg)'; });\n      }\n    }\n  }\n\n  componentWillUnmount() {\n    if (this._onScroll) {\n      window.removeEventListener('scroll', this._onScroll);\n      window.removeEventListener('resize', this._onScroll);\n    }\n    if (this._fallback) clearTimeout(this._fallback);\n  }\n\n  renderVals() { return { rootRef: this.rootRef }; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
    </script>
  </body>
